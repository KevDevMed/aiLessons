<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SecondSession</title>
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/os.css">
  <link rel="stylesheet" href="css/windows.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/presentation.css">
  <style>
    /* Inline minimal wallpaper pattern */
    .os-desktop {
      background:
        radial-gradient(circle at 20% 30%, rgba(138, 180, 248, 0.03) 0%, transparent 50%),
        radial-gradient(circle at 80% 70%, rgba(129, 201, 149, 0.03) 0%, transparent 50%),
        var(--bg-primary);
    }
  </style>
</head>
<body>

  <!-- Top Menu Bar -->
  <header class="os-menubar">
    <div class="os-menubar-left">
      <span class="os-menubar-logo">S</span>
      <span class="os-menubar-title" data-i18n="os.title">SecondSession</span>
    </div>
    <div class="os-menubar-right">
      <button class="os-lang-toggle" id="langToggle" data-i18n="os.lang.toggle">ES</button>
      <span class="os-menubar-clock" id="osClock">00:00</span>
    </div>
  </header>

  <!-- Desktop Area -->
  <main class="os-desktop" id="osDesktop">
    <!-- Icons injected by os.js -->
  </main>

  <!-- Window Layer -->
  <div class="os-window-layer" id="osWindowLayer">
    <!-- Windows injected by windowManager.js -->
  </div>

  <!-- Bottom Taskbar -->
  <footer class="os-taskbar" id="osTaskbar">
    <!-- Running app indicators -->
  </footer>

  <!-- Scripts -->
  <script src="js/i18n.js"></script>
  <script src="js/windowManager.js"></script>
  <script src="js/os.js"></script>
  <script src="js/presentationApp.js"></script>

</body>
</html>
